<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Project Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/login.css') }}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <img src="{{ url_for('static', filename='img/logo_alfamidi_square.png') }}" alt="Alfamidi Logo" />
      </div>

      <h1 class="login-title">Project Management System</h1>
      <p class="login-subtitle">Silakan login untuk melanjutkan</p>

      {% if error %}
      <div class="login-alert">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="login-field">
          <label for="nik">NIK</label>
          <div class="login-input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="nik" name="nik" placeholder="Masukkan NIK" required autofocus />
          </div>
        </div>

        <div class="login-field">
          <label for="password">Password</label>
          <div class="login-input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" name="password" placeholder="Masukkan Password" required />
          </div>
        </div>

        <button type="submit" class="login-btn">
          <span>Login</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>
  </div>

</body>
</html>
